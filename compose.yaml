services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    working_dir: /workspace
    volumes:
      - .:/workspace:cached           # source (bind mount)
      - venv:/opt/venv                # venv kept off the host filesystem
      - uv-cache:/home/dev/.cache/uv  # uv package cache persists across rebuilds
    tty: true
    stdin_open: true
    # Healthy means the venv matches the lockfile — asks uv directly.
    healthcheck:
      test: ["CMD", "uv", "sync", "--check"]
      start_period: 300s
      start_interval: 2s   # Compose 2.24+; start_period still covers older engines
      interval: 30s
      timeout: 10s

  # Future: local MQTT broker for testing. Uncomment when you fork for MQTT work.
  # mqtt:
  #   image: eclipse-mosquitto:2
  #   ports:
  #     - "1883:1883"
  #   volumes:
  #     - ./.docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  venv:
  uv-cache:
